services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AGENT_MODEL=${AGENT_MODEL:-google/gemini-2.0-flash-exp:free}
      - CHROMA_URL=http://chromadb:8000
      - DATA_PATH=/app/data/jobs.json
    depends_on:
      - chromadb
    volumes:
      - ./data:/app/data:ro

  frontend:
    build:
      context: ./frontend
      args:
        - BACKEND_URL=http://backend:3001
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:3001
    depends_on:
      - chromadb

volumes:
  chroma-data:
